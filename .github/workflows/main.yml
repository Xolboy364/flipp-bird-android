name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Capacitor Init
        run: npx cap init "Flipp Bird" "com.xolboy364.flippbird" --web-dir .
      - name: Add Android
        run: npx cap add android
      - name: Sync
        run: npx cap sync
      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlippBird-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
